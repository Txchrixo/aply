<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Aply · Options</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #FFE4B5;
        --fg: #4A2F1A;
        --muted: #79695E;
        --primary: #C65D00;
        --primary-fg: #FFE4B5;
        --accent: #FF9F1C;
        --border: #E5D5B5;
        --card: #FFF4DC;
        --success: #2ea043;
      }
      * { box-sizing: border-box; }
      body {
        font-family: "Poppins", system-ui, sans-serif;
        max-width: 560px;
        margin: 40px auto;
        padding: 0 20px 48px;
        color: var(--fg);
        background:
          radial-gradient(circle at 15% 10%, rgba(198, 93, 0, 0.08), transparent 40%),
          radial-gradient(circle at 85% 90%, rgba(255, 159, 28, 0.1), transparent 42%),
          var(--bg);
      }
      h1 {
        font-family: "Fraunces", Georgia, serif;
        font-size: 28px;
        letter-spacing: -0.02em;
        margin: 0 0 6px;
      }
      .lede { color: var(--muted); margin: 0 0 24px; font-size: 14px; }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
      }
      label { display: block; margin: 14px 0 6px; font-weight: 500; font-size: 13px; }
      label:first-child { margin-top: 0; }
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg);
        color: var(--fg);
        font: inherit;
      }
      input:focus {
        outline: 2px solid color-mix(in srgb, var(--primary) 40%, transparent);
        border-color: var(--primary);
      }
      .hint { color: var(--muted); font-size: 12px; margin-top: 6px; line-height: 1.45; }
      button {
        background: var(--primary);
        color: var(--primary-fg);
        border: 0;
        border-radius: 999px;
        padding: 11px 20px;
        margin-top: 18px;
        cursor: pointer;
        font-weight: 500;
        font: inherit;
      }
      button:hover { background: var(--accent); }
      #saved { color: var(--success); min-height: 1.2em; margin-top: 10px; font-size: 13px; }
      .session {
        margin-top: 18px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
        font-size: 13px;
        color: var(--muted);
      }
      .session strong { color: var(--fg); }
    </style>
  </head>
  <body>
    <h1>Aply · Options</h1>
    <p class="lede">Configure how the extension talks to your local Aply dashboard.</p>

    <div class="card">
      <label for="dashboard">Dashboard URL</label>
      <input id="dashboard" type="url" value="http://localhost:4000" />
      <p class="hint">Default is <code>http://localhost:4000</code>. Must match your running Next.js app.</p>

      <label for="whatsapp">WhatsApp number (approvals)</label>
      <input id="whatsapp" type="text" placeholder="+33 6 12 34 56 78" />

      <label for="notifyEmail">Email (approvals)</label>
      <input id="notifyEmail" type="email" placeholder="you@example.com" />

      <button id="save">Save settings</button>
      <p id="saved"></p>

      <div class="session" id="session">Not signed in — open the toolbar popup to connect.</div>
    </div>

    <script type="module">
      import { getConfig, clearSession } from "./shared.js";

      const fields = ["dashboard", "whatsapp", "notifyEmail"];

      const cfg = await getConfig();
      fields.forEach((k) => {
        if (cfg[k]) document.getElementById(k).value = cfg[k];
      });

      const sessionEl = document.getElementById("session");
      if (cfg.email) {
        sessionEl.innerHTML = `Signed in as <strong>${cfg.email}</strong> · <a href="#" id="signout">Sign out</a>`;
        document.getElementById("signout")?.addEventListener("click", async (e) => {
          e.preventDefault();
          await clearSession();
          sessionEl.textContent = "Signed out. Open the popup to sign in again.";
        });
      }

      document.getElementById("save").addEventListener("click", async () => {
        const data = {};
        fields.forEach((k) => {
          data[k] = document.getElementById(k).value.trim();
        });
        if (data.dashboard) data.dashboard = data.dashboard.replace(/\/$/, "");
        await chrome.storage.local.set(data);
        const el = document.getElementById("saved");
        el.textContent = "Saved.";
        setTimeout(() => (el.textContent = ""), 2000);
      });
    </script>
  </body>
</html>
